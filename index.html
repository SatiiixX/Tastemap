<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tastemap</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --r: 20px; --rs: 14px; --rxs: 8px;
  --t: 0.2s cubic-bezier(.4,0,.2,1);
  --font: 'Outfit', system-ui, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:#0d0d0d; --bg2:#161616; --bg3:#1f1f1f; --bg4:#2a2a2a; --bg5:#333;
    --card:#181818; --card2:#202020;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
    --text:#f2f2f2; --text2:#909090; --text3:#505050;
    --acc:#5eb8f5; --acc2:#3a8fd1; --acc-bg:rgba(94,184,245,.13);
    --green:#4ade80; --green-bg:rgba(74,222,128,.13);
    --yellow:#fbbf24; --yellow-bg:rgba(251,191,36,.13);
    --red:#f87171; --red-bg:rgba(248,113,113,.13);
    --pill:#242424; --pill-act:#5eb8f5; --pill-act-t:#0d0d0d;
    --nav:rgba(13,13,13,.93);
    --ov:rgba(0,0,0,.75);
    --shadow:0 8px 40px rgba(0,0,0,.4);
    --shadow2:0 2px 12px rgba(0,0,0,.3);
  }
}
@media (prefers-color-scheme: light) {
  :root {
    --bg:#f2f2f5; --bg2:#e8e8ec; --bg3:#dededf; --bg4:#d0d0d5; --bg5:#c5c5cb;
    --card:#fff; --card2:#f8f8fb;
    --border:rgba(0,0,0,.07); --border2:rgba(0,0,0,.13);
    --text:#111; --text2:#666; --text3:#aaa;
    --acc:#1a73e8; --acc2:#1558b0; --acc-bg:rgba(26,115,232,.1);
    --green:#16a34a; --green-bg:rgba(22,163,74,.1);
    --yellow:#d97706; --yellow-bg:rgba(217,119,6,.1);
    --red:#dc2626; --red-bg:rgba(220,38,38,.1);
    --pill:#e4e4e8; --pill-act:#1a73e8; --pill-act-t:#fff;
    --nav:rgba(242,242,245,.93);
    --ov:rgba(0,0,0,.5);
    --shadow:0 8px 40px rgba(0,0,0,.12);
    --shadow2:0 2px 12px rgba(0,0,0,.08);
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;position:relative;display:flex;flex-direction:column}

/* ── SCROLLABLE MAIN ── */
#appShell{display:flex;flex-direction:column;height:100%;overflow:hidden}
#scrollArea{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:100px}
#scrollArea::-webkit-scrollbar{display:none}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:90;background:var(--nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 18px 10px}
.hdr-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-size:24px;font-weight:900;letter-spacing:-.5px}.logo em{color:var(--acc);font-style:normal}
.hdr-btns{display:flex;gap:7px}
.ico-btn{width:38px;height:38px;border-radius:50%;background:var(--bg3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:var(--t);color:var(--text)}
.ico-btn:active{transform:scale(.9)}
.ico-btn.on{background:var(--acc-bg);color:var(--acc)}
.search-wrap{position:relative;margin-bottom:10px}
.search-inp{width:100%;padding:10px 14px 10px 40px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:var(--t)}
.search-inp:focus{border-color:var(--acc);background:var(--card)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}

/* filter bar */
.filter-bar{padding:0 18px 12px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:6px 13px;border-radius:100px;background:var(--pill);border:1.5px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;transition:var(--t);white-space:nowrap;user-select:none}
.pill.on{background:var(--pill-act);color:var(--pill-act-t);border-color:var(--pill-act)}
.pill:active{transform:scale(.93)}
.pill-btn{background:none;border:none}

/* ── STATS CHIPS ── */
.stats-row{display:flex;gap:9px;padding:10px 18px 4px;overflow-x:auto;scrollbar-width:none}
.stats-row::-webkit-scrollbar{display:none}
.stat-chip{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;cursor:pointer;transition:var(--t);min-width:72px;text-align:center;user-select:none}
.stat-chip:active{transform:scale(.94)}
.stat-chip.on{border-color:var(--acc);background:var(--acc-bg)}
.stat-v{font-size:20px;font-weight:800;color:var(--acc);line-height:1}
.stat-l{font-size:11px;color:var(--text3);font-weight:600;margin-top:3px}

/* ── SECTION ── */
.city-hdr{padding:16px 18px 6px;display:flex;align-items:center;gap:9px}
.city-name{font-size:17px;font-weight:800}
.city-cnt{font-size:12px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:100px}

/* ── LIST VIEW ── */
.list-wrap{padding:0 14px;display:flex;flex-direction:column;gap:10px}

.entry-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:var(--t);animation:slideIn .25s ease both}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.entry-card:active{transform:scale(.985)}

.card-img-strip{width:100%;height:140px;object-fit:cover;display:block}
.card-inner{padding:14px}
.card-top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-name{font-size:16px;font-weight:700;line-height:1.25;flex:1;min-width:0}
.score-bubble{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;flex-direction:column;gap:0}
.score-bubble .sub-lbl{font-size:8px;font-weight:700;opacity:.7;margin-top:1px}
.sh{background:var(--green-bg);color:var(--green)}
.sm{background:var(--yellow-bg);color:var(--yellow)}
.sl{background:var(--red-bg);color:var(--red)}
.sn{background:var(--bg3);color:var(--text3);font-size:18px}

.card-meta-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.tag{font-size:12px;color:var(--text2);background:var(--bg3);padding:2px 8px;border-radius:100px;font-weight:500;white-space:nowrap}
.tag.city{background:var(--acc-bg);color:var(--acc)}

.card-dish{font-size:13px;color:var(--text2);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-bottom{display:flex;align-items:center;justify-content:space-between}
.rec-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:100px}
.ry{background:var(--green-bg);color:var(--green)}
.rm{background:var(--yellow-bg);color:var(--yellow)}
.rn{background:var(--red-bg);color:var(--red)}
.card-right{display:flex;align-items:center;gap:8px}
.price-tag{font-size:13px;font-weight:700;color:var(--acc)}
.fav-btn{background:none;border:none;font-size:19px;cursor:pointer;padding:2px;line-height:1;transition:var(--t)}
.fav-btn:active{transform:scale(1.35)}

/* sub-score dots in list */
.sub-scores{display:flex;gap:10px;margin-top:6px}
.sub-s{display:flex;flex-direction:column;align-items:center;gap:2px}
.sub-s-val{font-size:11px;font-weight:700;color:var(--text2)}
.sub-s-lbl{font-size:9px;color:var(--text3);font-weight:600;letter-spacing:.3px;text-transform:uppercase}

/* ── GRID VIEW ── */
.grid-wrap{padding:0 14px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:var(--t);animation:slideIn .25s ease both}
.grid-card:active{transform:scale(.96)}
.grid-img{width:100%;height:110px;object-fit:cover;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:32px}
.grid-body{padding:10px}
.grid-name{font-size:13px;font-weight:700;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}
.grid-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.grid-city{font-size:11px;color:var(--acc);font-weight:600}
.grid-score{font-size:14px;font-weight:800;color:var(--text)}
.grid-score.sh{color:var(--green)}
.grid-score.sm{color:var(--yellow)}
.grid-score.sl{color:var(--red)}
.grid-score.sn{color:var(--text3)}
.grid-rec{font-size:11px;font-weight:700;padding:2px 7px;border-radius:100px}
.grid-fav{font-size:15px;line-height:1}

/* ── BOTTOM NAV ── */
.bnav{position:sticky;bottom:0;z-index:90;background:var(--nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:10px 0 max(12px,env(safe-area-inset-bottom))}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 14px;border-radius:var(--rs);transition:var(--t);color:var(--text3);font-family:var(--font)}
.nav-btn.on{color:var(--acc)}
.nav-btn:active{transform:scale(.88)}
.nav-ico{font-size:21px;line-height:1}
.nav-lbl{font-size:10px;font-weight:700}
.fab{width:54px;height:54px;border-radius:50%;background:var(--acc);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--pill-act-t);box-shadow:0 4px 20px rgba(94,184,245,.4);transition:var(--t);margin-top:-16px;flex-shrink:0}
.fab:active{transform:scale(.9)}

/* ── OVERLAY / SHEET ── */
.overlay{position:fixed;inset:0;background:var(--ov);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s ease}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:var(--card);border-radius:26px 26px 0 0;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .32s cubic-bezier(.34,1.1,.64,1);padding:0 20px 48px;scrollbar-width:none}
.sheet::-webkit-scrollbar{display:none}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:38px;height:4px;background:var(--bg4);border-radius:2px;margin:10px auto 18px}
.sheet-title{font-size:20px;font-weight:800;margin-bottom:18px}

/* form */
.fg{margin-bottom:14px}
.fl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;display:block}
.fi,.fs,.ft{width:100%;padding:11px 13px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:var(--t)}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--acc);background:var(--card)}
.ft{resize:none;min-height:72px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* score sliders */
.slider-group{display:flex;flex-direction:column;gap:10px}
.slider-row{display:flex;align-items:center;gap:10px}
.slider-name{font-size:12px;font-weight:700;color:var(--text2);width:60px;flex-shrink:0}
.slider{flex:1;-webkit-appearance:none;height:5px;border-radius:3px;background:var(--bg4);outline:none;cursor:pointer}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--acc);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.slider-val{width:32px;height:32px;border-radius:50%;background:var(--acc-bg);color:var(--acc);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.total-score{text-align:center;padding:12px;background:var(--bg3);border-radius:var(--rs);margin-top:8px}
.total-score .ts-num{font-size:32px;font-weight:900;color:var(--acc)}
.total-score .ts-lbl{font-size:12px;color:var(--text3);font-weight:600}

/* rec toggle */
.rec-tog{display:flex;gap:7px}
.rec-opt{flex:1;padding:9px 6px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;text-align:center;transition:var(--t)}
.rec-opt.sel-y{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.rec-opt.sel-m{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow)}
.rec-opt.sel-n{background:var(--red-bg);color:var(--red);border-color:var(--red)}

/* image upload */
.img-upload-area{width:100%;height:130px;border-radius:var(--rs);border:2px dashed var(--border2);background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:var(--t);position:relative;overflow:hidden}
.img-upload-area:hover{border-color:var(--acc)}
.img-preview{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.img-upload-hint{font-size:13px;color:var(--text3);font-weight:600;text-align:center;z-index:1}
.img-upload-icon{font-size:28px;margin-bottom:6px;z-index:1}
.img-remove{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}

/* buttons */
.btn-row{display:flex;gap:10px;margin-top:14px}
.btn{flex:1;padding:14px;border-radius:var(--rs);border:none;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;transition:var(--t)}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:var(--acc);color:var(--pill-act-t)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border)}

/* ── DETAIL SHEET ── */
.detail-hero{width:calc(100% + 40px);margin:-0px -20px 0;height:200px;object-fit:cover;display:block}
.detail-hero-placeholder{width:calc(100% + 40px);margin:0 -20px;height:160px;display:flex;align-items:center;justify-content:center;font-size:56px;background:var(--bg3)}
.detail-score-row{display:flex;align-items:flex-start;gap:14px;padding:16px 0 12px}
.detail-big-score{width:72px;height:72px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:24px;flex-shrink:0}
.detail-big-score .dbl{font-size:10px;font-weight:700;margin-top:1px;opacity:.7}
.detail-title{font-size:22px;font-weight:900;line-height:1.2;margin-bottom:3px}
.detail-city-row{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px}
.detail-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.detail-tag{font-size:13px;font-weight:700;padding:5px 12px;border-radius:100px;background:var(--acc-bg);color:var(--acc)}
.detail-section{background:var(--bg3);border-radius:var(--rs);padding:14px;margin-bottom:10px}
.detail-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.detail-section-text{font-size:14px;color:var(--text);line-height:1.55}
.sub-score-row{display:flex;justify-content:space-around;padding:10px 0}
.sub-score-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.sub-score-val{font-size:22px;font-weight:900;color:var(--acc)}
.sub-score-lbl{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.detail-action-row{display:flex;gap:8px;margin-top:12px}
.detail-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 8px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;text-decoration:none;transition:var(--t)}
.detail-btn:active{transform:scale(.95)}
.detail-btn.accent{background:var(--acc-bg);color:var(--acc);border-color:var(--acc)}
.detail-btn.danger{background:var(--red-bg);color:var(--red);border-color:var(--red)}

/* ── STATS VIEW ── */
.stats-view{padding:0 16px 20px}
.stats-view-title{font-size:22px;font-weight:900;padding:16px 2px 12px}
.stats-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:12px}
.scard-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.top-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.top-item:last-child{border-bottom:none}
.top-rank{width:24px;height:24px;border-radius:50%;background:var(--acc-bg);color:var(--acc);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.top-info{flex:1;min-width:0}
.top-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-sub{font-size:11px;color:var(--text3)}
.top-sc{font-size:15px;font-weight:900;color:var(--acc)}
.bar-item{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-lbl{font-size:12px;font-weight:700;color:var(--text2);width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--acc);transition:width .6s ease}
.bar-cnt{font-size:11px;color:var(--text3);width:18px;text-align:right;flex-shrink:0}
.kpi-row{display:flex;justify-content:space-around;padding:6px 0}
.kpi{display:flex;flex-direction:column;align-items:center;gap:3px}
.kpi-v{font-size:24px;font-weight:900;color:var(--acc)}
.kpi-l{font-size:11px;color:var(--text3);font-weight:700}

/* ── FILTER PANEL ── */
.filter-panel-body{display:flex;flex-direction:column;gap:18px}
.fp-group-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.fp-pills{display:flex;flex-wrap:wrap;gap:7px}
.fp-pill{padding:7px 13px;border-radius:100px;background:var(--pill);border:1.5px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;transition:var(--t);user-select:none}
.fp-pill.on{background:var(--pill-act);color:var(--pill-act-t);border-color:var(--pill-act)}
.fp-pill:active{transform:scale(.93)}
.fp-range{display:flex;align-items:center;gap:10px}
.fp-range label{font-size:13px;color:var(--text2);font-weight:600;white-space:nowrap}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-t{font-size:15px;font-weight:600}

/* toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--bg);padding:9px 20px;border-radius:100px;font-size:13px;font-weight:700;z-index:400;opacity:0;transition:all .28s ease;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* view toggle */
.view-toggle{display:flex;gap:5px}
.vt-btn{width:32px;height:32px;border-radius:var(--rxs);background:var(--bg3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:var(--t);color:var(--text3)}
.vt-btn.on{background:var(--acc-bg);color:var(--acc)}
.vt-btn:active{transform:scale(.9)}
</style>
</head>
<body>
<div id="appShell">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-row1">
    <div class="logo">Taste<em>map</em></div>
    <div class="hdr-btns">
      <div class="view-toggle">
        <button class="vt-btn on" id="btnList" onclick="setView('list')" title="Liste">☰</button>
        <button class="vt-btn" id="btnGrid" onclick="setView('grid')" title="Raster">⊞</button>
      </div>
      <button class="ico-btn" id="btnSort" onclick="cycleSort()" title="Sortieren">⇅</button>
      <button class="ico-btn" id="btnFilter" onclick="openFilter()" title="Filter">⚙</button>
    </div>
  </div>

  {id:20,date:'2023-12-07',city:'Bärnau',cat:'Restaurant',name:'Gasthof zur Post',dish:'Schnitzel, Leberknödelsuppe, Apfelstrudel',sEssen:7.6,sAmb:7,sSvc:8,rec:'Ja',price:'€€',notes:'Schnitzel sehr gut! Pommes top gewürzt. Große Portionen.',maps:'https://maps.app.goo.gl/hD8ugjqDcnU3Rrpj7',fav:false,img:null}
];
let nextId=21;

/* ── State ── */
let viewMode='list';
let sortMode='date';
let activeTab=0;
let selectedRec='Ja';
let filterCities=new Set();
let filterCats=new Set();
let filterRecs=new Set();
let filterPrices=new Set();
let filterScoreMin=1;
let formImg=null; // base64

/* ── Computed score ── */
function getScore(e){
  const vals=[e.sEssen,e.sAmb,e.sSvc].filter(v=>v!=null);
  if(!vals.length) return null;
  return parseFloat((vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1));
}
function scoreClass(s){
  if(s==null) return 'sn';
  if(s>=8) return 'sh';
  if(s>=6) return 'sm';
  return 'sl';
}
function recClass(r){return r==='Ja'?'ry':r==='Nein'?'rn':'rm'}
function fmtDate(d){if(!d)return '';const[y,m,dd]=d.split('-');return `${dd}.${m}.${y}`}
function catIcon(c){return CAT_ICONS[c]||'📍'}

/* ── Cities dynamic ── */
function allCities(){return[...new Set(DB.map(e=>e.city))].sort()}

/* ── FILTER ── */
function getFiltered(){
  const q=document.getElementById('searchInp').value.toLowerCase();
  return DB.filter(e=>{
    if(activeTab===1 && !e.fav) return false;
    if(filterCities.size && !filterCities.has(e.city)) return false;
    if(filterCats.size && !filterCats.has(e.cat)) return false;
    if(filterRecs.size && !filterRecs.has(e.rec)) return false;
    if(filterPrices.size){
      const p=e.price||'';
      if(![...filterPrices].some(fp=>p.includes(fp))) return false;
    }
    const sc=getScore(e);
    if(sc!=null && sc<filterScoreMin) return false;
    if(q&&!`${e.name} ${e.city} ${e.dish} ${e.notes}`.toLowerCase().includes(q)) return false;
    return true;
  });
}
function getSorted(arr){
  if(sortMode==='score') return[...arr].sort((a,b)=>(getScore(b)||0)-(getScore(a)||0));
  if(sortMode==='name') return[...arr].sort((a,b)=>a.name.localeCompare(b.name,'de'));
  return[...arr].sort((a,b)=>new Date(b.date)-new Date(a.date));
}

/* ── RENDER ── */
function render(){
  if(activeTab===2){renderStats();return}
  const filtered=getSorted(getFiltered());
  renderStatChips(filtered);
  renderCatBar();

  const mv=document.getElementById('mainView');
  if(!filtered.length){
    mv.innerHTML=`<div class="empty"><div class="empty-ico">🍽</div><div class="empty-t">Keine Einträge gefunden</div></div>`;
    return;
  }

  // group by city
  const groups={};
  filtered.forEach(e=>{
    if(!groups[e.city]) groups[e.city]=[];
    groups[e.city].push(e);
  });

  let html='';
  Object.entries(groups).forEach(([city,items])=>{
    html+=`<div class="city-hdr"><span class="city-name">${city}</span><span class="city-cnt">${items.length}</span></div>`;
    if(viewMode==='grid'){
      html+=`<div class="grid-wrap">`;
      items.forEach((e,i)=>{html+=renderGridCard(e,i)});
      html+=`</div>`;
    } else {
      html+=`<div class="list-wrap">`;
      items.forEach((e,i)=>{html+=renderListCard(e,i)});
      html+=`</div>`;
    }
  });
  mv.innerHTML=html;
}

function renderListCard(e,i){
  const sc=getScore(e);
  const scDisp=sc!=null?sc:'●';
  const scCls=scoreClass(sc);
  const imgHtml=e.img?`<img class="card-img-strip" src="${e.img}">`:'' ;
  const subHtml=e.sEssen!=null?`<div class="sub-scores">
    <div class="sub-s"><div class="sub-s-val">${e.sEssen}</div><div class="sub-s-lbl">Essen</div></div>
    <div class="sub-s"><div class="sub-s-val">${e.sAmb??'–'}</div><div class="sub-s-lbl">Ambien.</div></div>
    <div class="sub-s"><div class="sub-s-val">${e.sSvc??'–'}</div><div class="sub-s-lbl">Service</div></div>
  </div>`:'' ;
  return`<div class="entry-card" onclick="openDetail(${e.id})" style="animation-delay:${i*.04}s">
    ${imgHtml}
    <div class="card-inner">
      <div class="card-top-row">
        <div class="card-name">${e.name}</div>
        <div class="score-bubble ${scCls}">${scDisp}${sc!=null?'<span class="sub-lbl">/10</span>':''}</div>
      </div>
      <div class="card-meta-row">
        <span class="tag city">📍 ${e.city}</span>
        <span class="tag">${catIcon(e.cat)} ${e.cat}</span>
        ${e.date?`<span class="tag">${fmtDate(e.date)}</span>`:''}
      </div>
      ${e.dish&&e.dish!=='–'?`<div class="card-dish">🍴 ${e.dish}</div>`:''}
      <div class="card-bottom">
        <span class="rec-badge ${recClass(e.rec)}">${e.rec==='Ja'?'👍 Empfohlen':e.rec==='Nein'?'👎 Nicht empfohlen':'🤷 Geht so'}</span>
        <div class="card-right">
          ${e.price?`<span class="price-tag">${e.price}</span>`:''}
          <button class="fav-btn" onclick="toggleFav(event,${e.id})">${e.fav?'❤️':'🤍'}</button>
        </div>
      </div>
      ${subHtml}
    </div>
  </div>`;
}

function renderGridCard(e,i){
  const sc=getScore(e);
  const scCls=scoreClass(sc);
  const catIco=catIcon(e.cat);
  return`<div class="grid-card" onclick="openDetail(${e.id})" style="animation-delay:${i*.05}s">
    ${e.img?`<img class="grid-img" src="${e.img}" style="font-size:0">`:`<div class="grid-img">${catIco}</div>`}
    <div class="grid-body">
      <div class="grid-name">${e.name}</div>
      <div class="grid-row">
        <span class="grid-city">📍 ${e.city}</span>
        <span class="grid-score ${scCls}">${sc!=null?sc:'–'}</span>
      </div>
      <div class="grid-row">
        <span class="rec-badge grid-rec ${recClass(e.rec)}">${e.rec==='Ja'?'👍':e.rec==='Nein'?'👎':'🤷'} ${e.rec}</span>
        <span class="grid-fav">${e.fav?'❤️':'🤍'}</span>
      </div>
    </div>
  </div>`;
}

/* ── STAT CHIPS ── */
function renderStatChips(filtered){
  const withSc=filtered.filter(e=>getScore(e)!=null);
  const avg=withSc.length?(withSc.reduce((s,e)=>s+getScore(e),0)/withSc.length).toFixed(1):'–';
  const recs=filtered.filter(e=>e.rec==='Ja').length;
  const favs=DB.filter(e=>e.fav).length;
  const cities=[...new Set(DB.map(e=>e.city))];

  document.getElementById('statsRow').innerHTML=`
    <div class="stat-chip ${filterScoreMin>1?'on':''}" onclick="document.getElementById('fp-score-min').value=1;filterScoreMin=1;document.getElementById('fp-score-val').textContent=1;render()" title="Alle Bewertungen">
      <div class="stat-v">${filtered.length}</div><div class="stat-l">Einträge</div></div>
    <div class="stat-chip" onclick="statsChipAvg()">
      <div class="stat-v">${avg}</div><div class="stat-l">Ø Note</div></div>
    <div class="stat-chip ${[...filterRecs].includes('Ja')?'on':''}" onclick="statsChipRec()" title="Empfehlungen filtern">
      <div class="stat-v">${recs}</div><div class="stat-l">Empfohlen</div></div>
    <div class="stat-chip ${activeTab===1?'on':''}" onclick="switchTab(1)" title="Favoriten">
      <div class="stat-v">${favs}</div><div class="stat-l">Favoriten</div></div>
    <div class="stat-chip" onclick="statsChipCities(${cities.length})" title="Städte">
      <div class="stat-v">${cities.length}</div><div class="stat-l">Städte</div></div>
  `;
}

function statsChipAvg(){
  filterScoreMin=7;
  document.getElementById('fp-score-min').value=7;
  document.getElementById('fp-score-val').textContent='7';
  render();
  toast('Zeige Einträge ≥ 7.0');
}
function statsChipRec(){
  if(filterRecs.has('Ja')){filterRecs.clear();}else{filterRecs.clear();filterRecs.add('Ja');}
  render();
}
function statsChipCities(n){
  openFilter();
}

/* ── CAT FILTER BAR ── */
function renderCatBar(){
  const el=document.getElementById('catFilter');
  const cats=['Alle',...CATS];
  el.innerHTML=cats.map(c=>`<button class="pill ${filterCats.size===0&&c==='Alle'?'on':filterCats.has(c)?'on':''}" onclick="toggleCatBar('${c}')">${c==='Alle'?'Alle':catIcon(c)+' '+c}</button>`).join('');
}

function toggleCatBar(c){
  if(c==='Alle'){filterCats.clear();}
  else{
    if(filterCats.has(c)) filterCats.delete(c);
    else filterCats.add(c);
  }
  render();
}

/* ── DETAIL ── */
function openDetail(id){
  const e=DB.find(x=>x.id===id);if(!e)return;
  const sc=getScore(e);
  const scCls=scoreClass(sc);
  let html=``;
  if(e.img) html+=`<img class="detail-hero" src="${e.img}">`;
  else html+=`<div class="detail-hero-placeholder">${catIcon(e.cat)}</div>`;
  html+=`<div class="sheet-handle"></div>
  <div class="detail-score-row">
    <div class="detail-big-score ${scCls}">${sc??'–'}${sc!=null?'<span class="dbl">/10</span>':''}</div>
    <div>
      <div class="detail-title">${e.name}</div>
      <div class="detail-city-row">📍 ${e.city}${e.date?' · '+fmtDate(e.date):''}</div>
    </div>
  </div>
  <div class="detail-tags">
    <span class="detail-tag">${catIcon(e.cat)} ${e.cat}</span>
    ${e.price?`<span class="detail-tag">${e.price}</span>`:''}
    <span class="rec-badge ${recClass(e.rec)}">${e.rec==='Ja'?'👍 Empfohlen':e.rec==='Nein'?'👎 Nicht empfohlen':'🤷 Geht so'}</span>
  </div>`;

  if(e.sEssen!=null||e.sAmb!=null||e.sSvc!=null){
    html+=`<div class="detail-section">
      <div class="detail-section-title">Einzelbewertungen</div>
      <div class="sub-score-row">
        ${e.sEssen!=null?`<div class="sub-score-item"><div class="sub-score-val">${e.sEssen}</div><div class="sub-score-lbl">🍽 Essen</div></div>`:''}
        ${e.sAmb!=null?`<div class="sub-score-item"><div class="sub-score-val">${e.sAmb}</div><div class="sub-score-lbl">✨ Ambiente</div></div>`:''}
        ${e.sSvc!=null?`<div class="sub-score-item"><div class="sub-score-val">${e.sSvc}</div><div class="sub-score-lbl">🤝 Service</div></div>`:''}
      </div>
    </div>`;
  }
  if(e.dish&&e.dish!=='–') html+=`<div class="detail-section"><div class="detail-section-title">Gericht</div><div class="detail-section-text">🍴 ${e.dish}</div></div>`;
  if(e.notes) html+=`<div class="detail-section"><div class="detail-section-title">Notizen</div><div class="detail-section-text">${e.notes}</div></div>`;

  html+=`<div class="detail-action-row">
    ${e.maps?`<a class="detail-btn accent" href="${e.maps}" target="_blank">🗺 Maps</a>`:''}
    <button class="detail-btn" onclick="toggleFavDetail(${e.id})">${e.fav?'❤️ Entfernen':'🤍 Favorit'}</button>
    <button class="detail-btn" onclick="closeOverlay('detailOverlay');openForm(${e.id})">✏️ Bearbeiten</button>
    <button class="detail-btn danger" onclick="deleteEntry(${e.id})">🗑</button>
  </div>`;

  document.getElementById('detailSheet').innerHTML=html;
  document.getElementById('detailOverlay').classList.add('open');
}

function toggleFavDetail(id){
  const e=DB.find(x=>x.id===id);if(!e)return;
  e.fav=!e.fav;openDetail(id);render();
}

function deleteEntry(id){
  if(!confirm('Eintrag wirklich löschen?'))return;
  DB=DB.filter(x=>x.id!==id);
  closeOverlay('detailOverlay');render();toast('Eintrag gelöscht');
}

/* ── FORM ── */
function openForm(id){
  const today=new Date().toISOString().split('T')[0];
  formImg=null;
  document.getElementById('imgPreview').style.display='none';
  document.getElementById('imgRemove').style.display='none';
  document.getElementById('imgPreview').src='';

  updateCityDatalist();

  if(id===null){
    // new
    document.getElementById('formTitle').textContent='✦ Neuer Eintrag';
    document.getElementById('editId').value='';
    document.getElementById('f-city').value='';
    document.getElementById('f-date').value=today;
    document.getElementById('f-name').value='';
    document.getElementById('f-cat').value='Restaurant';
    document.getElementById('f-price').value='€€';
    document.getElementById('f-dish').value='';
    document.getElementById('f-notes').value='';
    document.getElementById('f-maps').value='';
    document.getElementById('f-s-essen').value=5;
    document.getElementById('f-s-amb').value=5;
    document.getElementById('f-s-svc').value=5;
    selectedRec='Ja';
  } else {
    const e=DB.find(x=>x.id===id);if(!e)return;
    document.getElementById('formTitle').textContent='✏️ Bearbeiten';
    document.getElementById('editId').value=id;
    document.getElementById('f-city').value=e.city;
    document.getElementById('f-date').value=e.date||today;
    document.getElementById('f-name').value=e.name;
    document.getElementById('f-cat').value=e.cat;
    document.getElementById('f-price').value=e.price||'€€';
    document.getElementById('f-dish').value=e.dish||'';
    document.getElementById('f-notes').value=e.notes||'';
    document.getElementById('f-maps').value=e.maps||'';
    document.getElementById('f-s-essen').value=e.sEssen??5;
    document.getElementById('f-s-amb').value=e.sAmb??5;
    document.getElementById('f-s-svc').value=e.sSvc??5;
    selectedRec=e.rec||'Ja';
    if(e.img){formImg=e.img;document.getElementById('imgPreview').src=e.img;document.getElementById('imgPreview').style.display='block';document.getElementById('imgRemove').style.display='flex';}
  }
  updateScores();
  setRec(document.querySelector(`.rec-opt[data-r="${selectedRec}"]`),selectedRec);
  document.getElementById('formOverlay').classList.add('open');
}

function updateCityDatalist(){
  const dl=document.getElementById('cityList');
  dl.innerHTML=allCities().map(c=>`<option value="${c}">`).join('');
}

function updateScores(){
  const a=parseFloat(document.getElementById('f-s-essen').value);
  const b=parseFloat(document.getElementById('f-s-amb').value);
  const c=parseFloat(document.getElementById('f-s-svc').value);
  document.getElementById('sv-essen').textContent=a;
  document.getElementById('sv-amb').textContent=b;
  document.getElementById('sv-svc').textContent=c;
  const avg=((a+b+c)/3).toFixed(1);
  document.getElementById('totalScoreNum').textContent=avg;
}

function setRec(btn,val){
  selectedRec=val;
  document.querySelectorAll('.rec-opt').forEach(b=>{
    b.className='rec-opt';
    if(b.dataset.r===val) b.className+=' sel-'+(val==='Ja'?'y':val==='Geht so'?'m':'n');
  });
}

function handleImg(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    formImg=ev.target.result;
    document.getElementById('imgPreview').src=formImg;
    document.getElementById('imgPreview').style.display='block';
    document.getElementById('imgRemove').style.display='flex';
  };
  r.readAsDataURL(f);
}

function removeImg(ev){
  ev.stopPropagation();
  formImg=null;
  document.getElementById('imgPreview').style.display='none';
  document.getElementById('imgRemove').style.display='none';
  document.getElementById('imgInp').value='';
}

function saveEntry(){
  const name=document.getElementById('f-name').value.trim();
  const city=document.getElementById('f-city').value.trim();
  if(!name||!city){toast('❗ Name und Stadt sind pflicht');return;}

  const obj={
    id:0,
    date:document.getElementById('f-date').value,
    city,
    cat:document.getElementById('f-cat').value,
    name,
    dish:document.getElementById('f-dish').value,
    sEssen:parseFloat(document.getElementById('f-s-essen').value),
    sAmb:parseFloat(document.getElementById('f-s-amb').value),
    sSvc:parseFloat(document.getElementById('f-s-svc').value),
    rec:selectedRec,
    price:document.getElementById('f-price').value,
    notes:document.getElementById('f-notes').value,
    maps:document.getElementById('f-maps').value,
    fav:false,
    img:formImg
  };

  const eid=document.getElementById('editId').value;
  if(eid){
    const idx=DB.findIndex(x=>x.id===parseInt(eid));
    if(idx>=0){obj.id=DB[idx].id;obj.fav=DB[idx].fav;DB[idx]=obj;}
    toast('✅ Eintrag aktualisiert!');
  } else {
    obj.id=nextId++;
    DB.unshift(obj);
    toast('✅ Eintrag gespeichert!');
  }

  closeOverlay('formOverlay');
  render();
  updateFilterPanelCities();
}

/* ── FILTER PANEL ── */
function openFilter(){
  updateFilterPanelCities();
  document.getElementById('filterOverlay').classList.add('open');
}

function updateFilterPanelCities(){
  const cities=allCities();
  document.getElementById('fp-cities').innerHTML=cities.map(c=>
    `<button class="fp-pill ${filterCities.has(c)?'on':''}" onclick="toggleFpCity(this,'${c}')">${c}</button>`
  ).join('');
  document.getElementById('fp-cats').innerHTML=CATS.map(c=>
    `<button class="fp-pill ${filterCats.has(c)?'on':''}" onclick="toggleFpCat(this,'${c}')">${catIcon(c)} ${c}</button>`
  ).join('');
  document.querySelectorAll('#fp-recs .fp-pill').forEach(b=>{
    b.classList.toggle('on',filterRecs.has(b.dataset.r));
  });
  document.querySelectorAll('#fp-prices .fp-pill').forEach(b=>{
    b.classList.toggle('on',filterPrices.has(b.dataset.p));
  });
}

function toggleFpCity(btn,c){
  if(filterCities.has(c)){filterCities.delete(c);btn.classList.remove('on');}
  else{filterCities.add(c);btn.classList.add('on');}
  renderCatBar();render();
}
function toggleFpCat(btn,c){
  if(filterCats.has(c)){filterCats.delete(c);btn.classList.remove('on');}
  else{filterCats.add(c);btn.classList.add('on');}
  renderCatBar();render();
}
function toggleFpRec(btn){
  const r=btn.dataset.r;
  if(filterRecs.has(r)){filterRecs.delete(r);btn.classList.remove('on');}
  else{filterRecs.add(r);btn.classList.add('on');}
  render();
}
function toggleFpPrice(btn){
  const p=btn.dataset.p;
  if(filterPrices.has(p)){filterPrices.delete(p);btn.classList.remove('on');}
  else{filterPrices.add(p);btn.classList.add('on');}
  render();
}
function resetFilter(){
  filterCities.clear();filterCats.clear();filterRecs.clear();filterPrices.clear();
  filterScoreMin=1;
  document.getElementById('fp-score-min').value=1;
  document.getElementById('fp-score-val').textContent=1;
  document.querySelectorAll('.fp-pill').forEach(b=>b.classList.remove('on'));
  render();
  toast('Filter zurückgesetzt');
}

/* fp score */
document.getElementById('fp-score-min').addEventListener('input',function(){
  filterScoreMin=parseFloat(this.value);render();
});

/* ── TABS ── */
function switchTab(t){
  activeTab=t;
  [0,1,2,3].forEach(i=>{document.getElementById('nb'+i).classList.toggle('on',i===t)});
  document.getElementById('mainView').style.display=t===2?'none':'block';
  document.getElementById('statsView').style.display=t===2?'block':'none';
  document.getElementById('statsRow').style.display=t===2?'none':'flex';
  const filterSection=document.querySelector('.filter-bar').parentElement;
  if(t===1){filterCats.clear();filterCities.clear();}
  render();
}

/* ── SORT ── */
const SORTS=['date','score','name'];
const SORT_ICONS=['⇅','⬆','🔤'];
function cycleSort(){
  sortMode=SORTS[(SORTS.indexOf(sortMode)+1)%SORTS.length];
  document.getElementById('btnSort').textContent=SORT_ICONS[SORTS.indexOf(sortMode)];
  toast('Sortierung: '+['Datum','Bewertung','Name'][SORTS.indexOf(sortMode)]);
  render();
}

/* ── VIEW ── */
function setView(v){
  viewMode=v;
  document.getElementById('btnList').classList.toggle('on',v==='list');
  document.getElementById('btnGrid').classList.toggle('on',v==='grid');
  render();
}

/* ── FAV TOGGLE ── */
function toggleFav(ev,id){
  ev.stopPropagation();
  const e=DB.find(x=>x.id===id);if(!e)return;
  e.fav=!e.fav;render();toast(e.fav?'❤️ Favorit gespeichert':'Favorit entfernt');
}

/* ── STATS VIEW ── */
function renderStats(){
  const sv=document.getElementById('statsView');
  const withSc=DB.filter(e=>getScore(e)!=null);
  const avg=withSc.length?(withSc.reduce((s,e)=>s+getScore(e),0)/withSc.length).toFixed(1):'–';
  const top=[...withSc].sort((a,b)=>getScore(b)-getScore(a)).slice(0,5);

  const cityMap={};DB.forEach(e=>{cityMap[e.city]=(cityMap[e.city]||0)+1});
  const cities=Object.entries(cityMap).sort((a,b)=>b[1]-a[1]);
  const maxC=cities[0]?.[1]||1;

  const catMap={};DB.forEach(e=>{catMap[e.cat]=(catMap[e.cat]||0)+1});
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxCt=cats[0]?.[1]||1;

  const avgEssen=DB.filter(e=>e.sEssen).length?(DB.filter(e=>e.sEssen).reduce((s,e)=>s+e.sEssen,0)/DB.filter(e=>e.sEssen).length).toFixed(1):'–';
  const avgAmb=DB.filter(e=>e.sAmb).length?(DB.filter(e=>e.sAmb).reduce((s,e)=>s+e.sAmb,0)/DB.filter(e=>e.sAmb).length).toFixed(1):'–';
  const avgSvc=DB.filter(e=>e.sSvc).length?(DB.filter(e=>e.sSvc).reduce((s,e)=>s+e.sSvc,0)/DB.filter(e=>e.sSvc).length).toFixed(1):'–';

  sv.innerHTML=`<div class="stats-view-title">📊 Statistik</div>
  <div class="stats-card">
    <div class="scard-title">Übersicht</div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-v">${DB.length}</div><div class="kpi-l">Gesamt</div></div>
      <div class="kpi"><div class="kpi-v">${avg}</div><div class="kpi-l">Ø Note</div></div>
      <div class="kpi"><div class="kpi-v">${DB.filter(e=>e.fav).length}</div><div class="kpi-l">Favoriten</div></div>
      <div class="kpi"><div class="kpi-v">${DB.filter(e=>e.rec==='Ja').length}</div><div class="kpi-l">Empfohlen</div></div>
    </div>
  </div>
  <div class="stats-card">
    <div class="scard-title">Ø Einzelbewertungen</div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-v">${avgEssen}</div><div class="kpi-l">🍽 Essen</div></div>
      <div class="kpi"><div class="kpi-v">${avgAmb}</div><div class="kpi-l">✨ Ambiente</div></div>
      <div class="kpi"><div class="kpi-v">${avgSvc}</div><div class="kpi-l">🤝 Service</div></div>
    </div>
  </div>
  <div class="stats-card">
    <div class="scard-title">🏆 Top Bewertungen</div>
    ${top.map((e,i)=>`<div class="top-item" onclick="closeOverlay('x');openDetail(${e.id})">
      <div class="top-rank">${i+1}</div>
      <div class="top-info"><div class="top-name">${e.name}</div><div class="top-sub">${e.city} · ${e.cat}</div></div>
      <div class="top-sc">${getScore(e)}</div>
    </div>`).join('')}
  </div>
  <div class="stats-card">
    <div class="scard-title">📍 Nach Stadt</div>
    ${cities.map(([c,n])=>`<div class="bar-item"><div class="bar-lbl">${c}</div><div class="bar-track"><div class="bar-fill" style="width:${(n/maxC*100).toFixed(0)}%"></div></div><div class="bar-cnt">${n}</div></div>`).join('')}
  </div>
  <div class="stats-card">
    <div class="scard-title">🗂 Nach Kategorie</div>
    ${cats.map(([c,n])=>`<div class="bar-item"><div class="bar-lbl">${catIcon(c)} ${c}</div><div class="bar-track"><div class="bar-fill" style="width:${(n/maxCt*100).toFixed(0)}%"></div></div><div class="bar-cnt">${n}</div></div>`).join('')}
  </div>`;
}

/* ── EXPORT ── */
function exportCSV(){
  const h=['Datum','Stadt','Kategorie','Name','Gericht','Essen','Ambiente','Service','Gesamt','Empfehlung','Preis','Notizen','Maps'];
  const rows=DB.map(e=>[e.date,e.city,e.cat,e.name,e.dish,e.sEssen??'',e.sAmb??'',e.sSvc??'',getScore(e)??'',e.rec,e.price,e.notes?.replace(/\n/g,' '),e.maps].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(';'));
  const blob=new Blob(['\uFEFF'+[h.join(';'),...rows].join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Tastemap.csv';a.click();
  toast('📤 CSV exportiert');
}

/* ── OVERLAY HELPERS ── */
function closeOverlay(id){document.getElementById(id).classList.remove('open')}
function overlayClose(ev,id){if(ev.target===document.getElementById(id))closeOverlay(id)}

/* ── TOAST ── */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

/* ── INIT ── */
renderCatBar();
render();
</script>
</body>
</html>
