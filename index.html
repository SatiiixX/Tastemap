<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tastemap</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--r:20px;--rs:14px;--rxs:8px;--t:.2s cubic-bezier(.4,0,.2,1);--font:'Outfit',system-ui,sans-serif}
@media(prefers-color-scheme:dark){:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1f1f1f;--bg4:#2a2a2a;--bg5:#333;
  --card:#181818;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#f2f2f2;--text2:#909090;--text3:#505050;
  --acc:#5eb8f5;--acc-bg:rgba(94,184,245,.13);
  --green:#4ade80;--green-bg:rgba(74,222,128,.13);
  --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,.13);
  --red:#f87171;--red-bg:rgba(248,113,113,.13);
  --pill:#242424;--pill-act:#5eb8f5;--pill-act-t:#0d0d0d;
  --nav:rgba(13,13,13,.96);--ov:rgba(0,0,0,.82);
}}
@media(prefers-color-scheme:light){:root{
  --bg:#f2f2f5;--bg2:#e8e8ec;--bg3:#dededf;--bg4:#d0d0d5;--bg5:#c5c5cb;
  --card:#fff;--border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.13);
  --text:#111;--text2:#666;--text3:#aaa;
  --acc:#1a73e8;--acc-bg:rgba(26,115,232,.1);
  --green:#16a34a;--green-bg:rgba(22,163,74,.1);
  --yellow:#d97706;--yellow-bg:rgba(217,119,6,.1);
  --red:#dc2626;--red-bg:rgba(220,38,38,.1);
  --pill:#e4e4e8;--pill-act:#1a73e8;--pill-act-t:#fff;
  --nav:rgba(242,242,245,.96);--ov:rgba(0,0,0,.55);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;display:flex;flex-direction:column}
#shell{display:flex;flex-direction:column;height:100%;overflow:hidden}
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:96px}
#scroll::-webkit-scrollbar{display:none}

/* HEADER */
.hdr{position:sticky;top:0;z-index:90;background:var(--nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 18px 10px}
.hdr1{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-size:24px;font-weight:900;letter-spacing:-.5px;user-select:none}
.logo em{color:var(--acc);font-style:normal}
.hdr-btns{display:flex;gap:5px;align-items:center}
.ico-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:var(--t);color:var(--text)}
.ico-btn:active{transform:scale(.88)}
.vt{display:flex;gap:3px}
.vt-btn{width:30px;height:30px;border-radius:var(--rxs);background:var(--bg3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:var(--t);color:var(--text3)}
.vt-btn.on{background:var(--acc-bg);color:var(--acc)}
.search-w{position:relative;margin-bottom:10px}
.search-inp{width:100%;padding:10px 14px 10px 40px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:var(--t)}
.search-inp:focus{border-color:var(--acc);background:var(--card)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
.fbar{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.fbar::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:5px 12px;border-radius:100px;background:var(--pill);border:1.5px solid var(--border);color:var(--text2);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;transition:var(--t);white-space:nowrap;user-select:none}
.pill.on{background:var(--pill-act);color:var(--pill-act-t);border-color:var(--pill-act)}
.pill:active{transform:scale(.92)}

/* STAT CHIPS */
.chips{display:flex;gap:8px;padding:12px 18px 4px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:9px 13px;cursor:pointer;transition:var(--t);min-width:64px;text-align:center;user-select:none}
.chip:active{transform:scale(.93)}
.chip.on{border-color:var(--acc);background:var(--acc-bg)}
.chip-v{font-size:18px;font-weight:800;color:var(--acc);line-height:1}
.chip-l{font-size:10px;color:var(--text3);font-weight:600;margin-top:3px}

/* CARDS */
.city-hdr{padding:16px 18px 6px;display:flex;align-items:center;gap:9px}
.city-nm{font-size:17px;font-weight:800}
.city-ct{font-size:12px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:100px}
.list-w{padding:0 14px;display:flex;flex-direction:column;gap:10px}
.ecard{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform var(--t);animation:fup .25s ease both}
@keyframes fup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ecard:active{transform:scale(.985)}
.ecard-img{width:100%;height:126px;object-fit:cover;display:block}
.ecard-body{padding:13px}
.ecard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px}
.ecard-name{font-size:16px;font-weight:700;line-height:1.25;flex:1;min-width:0}
.score-bub{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;flex-direction:column}
.score-bub .sl{font-size:8px;opacity:.7;margin-top:1px;font-weight:700}
.sh{background:var(--green-bg);color:var(--green)}
.sm{background:var(--yellow-bg);color:var(--yellow)}
.sl{background:var(--red-bg);color:var(--red)}
.sn{background:var(--bg3);color:var(--text3);font-size:18px}
/* Row 1: city / cat / cuisine */
.ecard-row1{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:5px}
/* Row 2: last visit / count / trend */
.ecard-row2{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.tag{font-size:11px;color:var(--text2);background:var(--bg3);padding:2px 7px;border-radius:100px;font-weight:500;white-space:nowrap}
.tag.city{background:var(--acc-bg);color:var(--acc)}
.tag.cuisine{background:var(--yellow-bg);color:var(--yellow)}
.tag.visits{background:var(--green-bg);color:var(--green)}
.trend-b{font-size:12px;font-weight:700;padding:2px 6px;border-radius:100px}
.tu{background:var(--green-bg);color:var(--green)}
.td{background:var(--red-bg);color:var(--red)}
.te{background:var(--bg3);color:var(--text3)}
.ecard-bottom{display:flex;align-items:center;justify-content:space-between;gap:6px}
.rec-b{font-size:11px;font-weight:700;padding:3px 9px;border-radius:100px;flex-shrink:0}
.ry{background:var(--green-bg);color:var(--green)}
.rm{background:var(--yellow-bg);color:var(--yellow)}
.rn{background:var(--red-bg);color:var(--red)}
.ecard-right{display:flex;align-items:center;gap:5px}
.price-t{font-size:12px;font-weight:700;color:var(--acc)}
.fav-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:2px;line-height:1;transition:var(--t)}
.fav-btn:active{transform:scale(1.4)}
/* Trend sparkline — mini SVG inline */
.trendline-wrap{flex:1;display:flex;align-items:center;gap:6px;min-width:0;overflow:hidden}
.trendline-svg{flex:1;height:22px;min-width:40px;max-width:80px}
.sub-scores-mini{display:flex;gap:8px;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.ssm{display:flex;flex-direction:column;align-items:center;gap:1px}
.ssm-v{font-size:11px;font-weight:700;color:var(--text2)}
.ssm-l{font-size:9px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px}

/* GRID */
.grid-w{padding:0 14px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gcard{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:var(--t);animation:fup .25s ease both}
.gcard:active{transform:scale(.96)}
.gcard-img{width:100%;height:100px;object-fit:cover;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px}
.gcard-body{padding:10px}
.gcard-name{font-size:13px;font-weight:700;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}
.gcard-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.gcard-city{font-size:11px;color:var(--acc);font-weight:600}
.gcard-score{font-size:14px;font-weight:800}

/* BOTTOM NAV */
.bnav{position:sticky;bottom:0;z-index:90;background:var(--nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:8px 0 max(12px,env(safe-area-inset-bottom))}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:5px 8px;border-radius:var(--rs);transition:var(--t);color:var(--text3);font-family:var(--font)}
.nav-btn.on{color:var(--acc)}
.nav-btn:active{transform:scale(.88)}
.nav-ico{font-size:19px;line-height:1}
.nav-lbl{font-size:10px;font-weight:700}
.fab{width:50px;height:50px;border-radius:50%;background:var(--acc);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--pill-act-t);box-shadow:0 4px 20px rgba(94,184,245,.4);transition:var(--t);margin-top:-12px;flex-shrink:0}
.fab:active{transform:scale(.9)}

/* MODALS — layered z-index system:
   detail=300, visitDetail=400, forms=500
   Each sits above the previous */
.ov{position:fixed;inset:0;background:var(--ov);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease;padding:20px}
.ov.open{opacity:1;pointer-events:all}
/* centered zoom-pop modal */
.mbox{background:var(--card);border-radius:24px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;transform:scale(.88);opacity:0;transition:transform .25s cubic-bezier(.34,1.2,.64,1),opacity .2s ease;scrollbar-width:none;position:relative}
.mbox::-webkit-scrollbar{display:none}
.ov.open .mbox{transform:scale(1);opacity:1}
/* bottom sheet */
.sheet-ov{position:fixed;inset:0;background:var(--ov);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease}
.sheet-ov.open{opacity:1;pointer-events:all}
.sheet{background:var(--card);border-radius:26px 26px 0 0;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .32s cubic-bezier(.34,1.1,.64,1);padding:0 20px 52px;scrollbar-width:none;position:relative}
.sheet::-webkit-scrollbar{display:none}
.sheet-ov.open .sheet{transform:translateY(0)}
/* z-index layers */
#detailOv{z-index:300}
#visitDetailOv{z-index:400}
#visitFormOv{z-index:500}
#restFormOv{z-index:500}
#filterOv{z-index:500}
#cuisineOv{z-index:600}

.handle{width:38px;height:4px;background:var(--bg4);border-radius:2px;margin:10px auto 16px}
.mox{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.38);border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#fff;z-index:10;transition:var(--t);backdrop-filter:blur(4px)}
.mox:active{transform:scale(.88)}
.sox{position:absolute;top:14px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--bg3);border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:var(--t);z-index:2}
.sox:active{transform:scale(.88)}
.sh-title{font-size:20px;font-weight:800;margin-bottom:16px;padding-right:40px}

/* DETAIL MODAL */
.dm-hero{width:100%;height:180px;object-fit:cover;display:block;border-radius:24px 24px 0 0}
.dm-hero-ph{width:100%;height:140px;display:flex;align-items:center;justify-content:center;font-size:52px;background:var(--bg3);border-radius:24px 24px 0 0}
.dm-body{padding:16px 18px 20px}
.dm-score-row{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.dm-big{width:62px;height:62px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:20px;flex-shrink:0}
.dm-big .dbl{font-size:10px;font-weight:700;margin-top:1px;opacity:.7}
.dm-title{font-size:20px;font-weight:900;line-height:1.2;margin-bottom:3px}
.dm-sub{font-size:12px;color:var(--text2);line-height:1.4}
.dm-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.dm-tag{font-size:12px;font-weight:700;padding:4px 10px;border-radius:100px;background:var(--acc-bg);color:var(--acc)}
.dm-sec{background:var(--bg3);border-radius:var(--rs);padding:12px;margin-bottom:9px}
.dm-sec-t{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px}
.dm-sec-txt{font-size:13px;color:var(--text);line-height:1.55}
.ssc-row{display:flex;justify-content:space-around;padding:6px 0}
.ssc{display:flex;flex-direction:column;align-items:center;gap:3px}
.ssc-v{font-size:20px;font-weight:900;color:var(--acc)}
.ssc-l{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.dm-actions{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.dm-btn{flex:1;min-width:56px;display:flex;align-items:center;justify-content:center;gap:4px;padding:10px 5px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;text-decoration:none;transition:var(--t)}
.dm-btn:active{transform:scale(.93)}
.dm-btn.acc{background:var(--acc-bg);color:var(--acc);border-color:var(--acc)}
.dm-btn.warn{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow)}
.dm-btn.danger{background:var(--red-bg);color:var(--red);border-color:var(--red)}

/* VISIT LIST */
.vlist{display:flex;flex-direction:column;gap:7px}
.vitem{display:flex;align-items:center;gap:10px;padding:10px 11px;background:var(--card);border-radius:var(--rs);border:1px solid var(--border);cursor:pointer;transition:var(--t)}
.vitem:active{transform:scale(.98)}
.vitem.latest{border-color:var(--acc);background:var(--acc-bg)}
.vdot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.vinfo{flex:1;min-width:0}
.vdate{font-size:13px;font-weight:700}
.vsub{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vsc{font-size:15px;font-weight:900;color:var(--acc);flex-shrink:0}

/* VISIT DETAIL MODAL */
.vd-score-row{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-right:36px}
.vd-big{width:58px;height:58px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0}
.vd-big .dbl{font-size:9px;font-weight:700;opacity:.7;margin-top:1px}
.vd-title{font-size:17px;font-weight:800;line-height:1.2}
.vd-sub{font-size:12px;color:var(--text2);margin-top:2px}
.vd-actions{display:flex;gap:8px;margin-top:12px}
.vd-btn{flex:1;padding:11px 8px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;transition:var(--t);display:flex;align-items:center;justify-content:center;gap:5px}
.vd-btn:active{transform:scale(.94)}
.vd-btn.edit{background:var(--acc-bg);color:var(--acc);border-color:var(--acc)}
.vd-btn.del{background:var(--red-bg);color:var(--red);border-color:var(--red)}

/* CHART */
.chart-wrap{position:relative;width:100%}
.chart-svg{width:100%;overflow:visible;display:block}
.c-grid{stroke:var(--border);stroke-width:1}
.c-line{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.c-dot{cursor:pointer}
.c-xlbl{font-size:9px;fill:var(--text3);text-anchor:middle;font-family:var(--font)}
.c-ylbl{font-size:9px;fill:var(--text3);text-anchor:end;font-family:var(--font)}
.chart-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:5px}
.cleg{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--text2)}
.cleg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* FORM */
.fg{margin-bottom:13px}
.fl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;display:block}
.fi,.fs,.ft{width:100%;padding:11px 13px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:var(--t)}
.fi:focus,.fs:focus,.ft:focus{border-color:var(--acc);background:var(--card)}
.ft{resize:none;min-height:68px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.slrow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.slnm{font-size:12px;font-weight:700;color:var(--text2);width:58px;flex-shrink:0}
.sl-inp{flex:1;-webkit-appearance:none;height:5px;border-radius:3px;background:var(--bg4);outline:none;cursor:pointer}
.sl-inp::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--acc);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.slval{width:32px;height:32px;border-radius:50%;background:var(--acc-bg);color:var(--acc);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.total-sc{text-align:center;padding:10px;background:var(--bg3);border-radius:var(--rs);margin-top:7px}
.ts-n{font-size:28px;font-weight:900;color:var(--acc)}
.ts-l{font-size:11px;color:var(--text3);font-weight:600}
.rec-tog{display:flex;gap:7px}
.ropt{flex:1;padding:9px 4px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;text-align:center;transition:var(--t)}
.ropt.sly{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.ropt.slm{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow)}
.ropt.sln{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.img-area{width:100%;height:116px;border-radius:var(--rs);border:2px dashed var(--border2);background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:var(--t);position:relative;overflow:hidden}
.img-area:hover{border-color:var(--acc)}
.img-prev{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.img-hint{font-size:12px;color:var(--text3);font-weight:600;z-index:1}
.img-ico{font-size:24px;margin-bottom:4px;z-index:1}
.img-rm{position:absolute;top:7px;right:7px;width:25px;height:25px;border-radius:50%;background:rgba(0,0,0,.55);border:none;color:#fff;font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2}
.tags-w{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg3);min-height:42px;cursor:text}
.tags-w:focus-within{border-color:var(--acc);background:var(--card)}
.tchip{display:flex;align-items:center;gap:4px;background:var(--acc-bg);color:var(--acc);font-size:12px;font-weight:700;padding:3px 9px;border-radius:100px}
.tchip button{background:none;border:none;color:var(--acc);font-size:13px;cursor:pointer;padding:0;line-height:1}
.tinp{border:none;background:none;color:var(--text);font-size:13px;font-family:var(--font);outline:none;min-width:80px;flex:1}
.btn-row{display:flex;gap:10px;margin-top:14px}
.btn{flex:1;padding:13px;border-radius:var(--rs);border:none;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;transition:var(--t)}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--acc);color:var(--pill-act-t)}
.btn-g{background:var(--bg3);color:var(--text2);border:1.5px solid var(--border)}
.dupe-w{background:var(--yellow-bg);border:1.5px solid var(--yellow);border-radius:var(--rs);padding:10px 13px;font-size:13px;color:var(--yellow);font-weight:600;margin-bottom:10px;display:none;cursor:pointer}
.div{height:1px;background:var(--border);margin:13px 0}

/* DISH RATINGS */
.dish-list{display:flex;flex-direction:column;gap:8px}
.dish-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;background:var(--card);border-radius:var(--rs);border:1px solid var(--border)}
.dish-name{font-size:13px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dish-score{font-size:14px;font-weight:800}
.dish-rec{font-size:11px;padding:2px 7px;border-radius:100px}

/* FILTER PANEL */
.fp-g{margin-bottom:14px}
.fp-t{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px}
.fp-pills{display:flex;flex-wrap:wrap;gap:7px}
.fp-p{padding:6px 12px;border-radius:100px;background:var(--pill);border:1.5px solid var(--border);color:var(--text2);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;transition:var(--t);user-select:none}
.fp-p.on{background:var(--pill-act);color:var(--pill-act-t);border-color:var(--pill-act)}
.fp-range{display:flex;align-items:center;gap:10px}
.fp-range label{font-size:14px;color:var(--acc);font-weight:700;min-width:24px;text-align:right}

/* STATS */
.sv-title{font-size:22px;font-weight:900;padding:14px 2px 12px}
.sc{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:15px;margin-bottom:11px}
.sc-t{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:11px;text-transform:uppercase;letter-spacing:.5px}
.top-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.top-item:last-child{border-bottom:none}
.top-rank{width:24px;height:24px;border-radius:50%;background:var(--acc-bg);color:var(--acc);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.top-info{flex:1;min-width:0}
.top-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-sub{font-size:11px;color:var(--text3)}
.top-sc{font-size:15px;font-weight:900;color:var(--acc)}
.bar-i{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.bar-l{font-size:12px;font-weight:700;color:var(--text2);width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-t{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-f{height:100%;border-radius:4px;background:var(--acc);transition:width .6s ease}
.bar-c{font-size:11px;color:var(--text3);width:18px;text-align:right;flex-shrink:0}
.kpi-row{display:flex;justify-content:space-around;padding:6px 0}
.kpi{display:flex;flex-direction:column;align-items:center;gap:2px}
.kpi-v{font-size:22px;font-weight:900;color:var(--acc)}
.kpi-l{font-size:10px;color:var(--text3);font-weight:700}

/* TIMELINE */
.tl-mo{font-size:13px;font-weight:800;color:var(--text3);padding:14px 2px 7px;text-transform:uppercase;letter-spacing:.5px}
.tl-i{display:flex;gap:12px;margin-bottom:10px;cursor:pointer}
.tl-left{display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0}
.tl-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--bg3);border:2px solid var(--border);flex-shrink:0}
.tl-line{width:2px;flex:1;background:var(--border);margin:3px 0;min-height:10px}
.tl-card{flex:1;background:var(--card);border-radius:var(--rs);padding:11px 13px;border:1px solid var(--border);transition:var(--t)}
.tl-card:active{transform:scale(.98)}
.tl-date{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:2px}
.tl-name{font-size:15px;font-weight:700}
.tl-meta{font-size:12px;color:var(--text2);margin-top:2px}

/* MAP */
.map-wrap{padding:14px}
#mapEl{width:100%;height:calc(100vh - 200px);min-height:300px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border)}
.map-err{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 200px);min-height:300px;color:var(--text3);font-size:14px;text-align:center;padding:20px;gap:10px}

/* CUISINE EDITOR */
.ced-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.ced-item:last-child{border-bottom:none}
.ced-nm{flex:1;font-size:14px;font-weight:600}
.ced-del{width:28px;height:28px;border-radius:50%;background:var(--red-bg);color:var(--red);border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:var(--t);flex-shrink:0}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-t{font-size:15px;font-weight:600}

/* TOAST */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--bg);padding:9px 20px;border-radius:100px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:all .28s ease;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<script>
/* ══════════════ DATA MODEL ══════════════
  Restaurant: {id,city,cat,name,cuisine,price,maps,web,img,tags[],fav,visits[]}
  Visit:      {id,date,dish,sE,sA,sS,rec,notes,dishes:[{name,score,rec}]}
═════════════════════════════════════════ */
const CAT_ICONS={Restaurant:'🍽',Bar:'🍹',Club:'🎵',Cafe:'☕',Hotel:'🏨',Geschäft:'🛍',Kultur:'🎨'};
const CATS=['Restaurant','Bar','Club','Cafe','Hotel','Geschäft','Kultur'];
let CUISINES=['🇩🇪 Deutsch','🇦🇹 Österreichisch','🇮🇹 Italienisch','🇯🇵 Japanisch','🇹🇷 Türkisch','🇲🇽 Mexikanisch','🇮🇳 Indisch','🇨🇳 Chinesisch','🇬🇷 Griechisch','🇫🇷 Französisch','🇺🇸 Amerikanisch','🇹🇭 Thailändisch','🇻🇳 Vietnamesisch','🇱🇧 Libanesisch','🍣 Sushi','🍕 Pizza','🥩 Steakhouse','🍔 Burger','🍺 Brauhaus/Biergarten','☕ Café/Bäckerei','🍸 Bar/Cocktails','🌍 International'];

let nRid=21,nVid=200;
function nvsc(o){return{id:o.id??nVid++,date:o.date||'',dish:o.dish||'',sE:o.sE??null,sA:o.sA??null,sS:o.sS??null,rec:o.rec||'Ja',notes:o.notes||'',dishes:o.dishes||[]}}
function vSc(v){const a=[v.sE,v.sA,v.sS].filter(x=>x!=null);return a.length?parseFloat((a.reduce((s,x)=>s+x,0)/a.length).toFixed(1)):null}
function rLV(r){return r.visits.length?[...r.visits].sort((a,b)=>new Date(b.date)-new Date(a.date))[0]:null}
function rLSc(r){const lv=rLV(r);return lv?vSc(lv):null}
function rLRec(r){const lv=rLV(r);return lv?lv.rec:'–'}
function trend(r){
  if(r.visits.length<2)return null;
  const s=[...r.visits].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const a=vSc(s[s.length-2]),b=vSc(s[s.length-1]);
  if(a==null||b==null)return null;
  if(b>a+0.4)return{i:'↑',c:'tu'};if(b<a-0.4)return{i:'↓',c:'td'};return{i:'→',c:'te'};
}
function mkR(city,cat,name,cuisine,price,maps,web,img,tags,fav,visits){
  return{id:nRid++,city,cat,name,cuisine:cuisine||'',price,maps:maps||'',web:web||'',img:img||null,tags:tags||[],fav:fav||false,visits:visits.map(nvsc)}
}
function mkV(date,dish,sE,sA,sS,rec,notes){return nvsc({date,dish,sE,sA,sS,rec,notes,dishes:[]})}

let DB=[

/* ── Helpers ── */
function scCls(s){if(s==null)return'sn';if(s>=8)return'sh';if(s>=6)return'sm';return'sl'}
function recCls(r){return r==='Ja'?'ry':r==='Nein'?'rn':'rm'}
function fmtD(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}.${m}.${y}`}
function catIco(c){return CAT_ICONS[c]||'📍'}
function allCities(){return[...new Set(DB.map(r=>r.city))].sort()}
function allTags(){return[...new Set(DB.flatMap(r=>r.tags))].sort()}
function allCuisinesUsed(){return[...new Set(DB.map(r=>r.cuisine).filter(Boolean))].sort()}
function saveLS(){try{localStorage.setItem('tm6',JSON.stringify({DB,nRid,nVid,CUISINES}))}catch(e){}}
function loadLS(){try{const d=JSON.parse(localStorage.getItem('tm6'));if(d){DB=d.DB;nRid=d.nRid;nVid=d.nVid;if(d.CUISINES)CUISINES=d.CUISINES;}}catch(e){}}
function togS(set,val,btn){if(set.has(val)){set.delete(val);btn?.classList.remove('on');}else{set.add(val);btn?.classList.add('on');}}

/* ── FILTER ── */
function getFiltered(){
  const q=document.getElementById('searchInp').value.toLowerCase();
  return DB.filter(r=>{
    if(activeTab===1&&!r.fav)return false;
    if(fCities.size&&!fCities.has(r.city))return false;
    if(fCats.size&&!fCats.has(r.cat))return false;
    if(fCuisines.size&&!fCuisines.has(r.cuisine))return false;
    if(fRec.size&&!fRec.has(rLRec(r)))return false;
    if(fPrice.size){const p=r.price||'';if(![...fPrice].some(fp=>p.includes(fp)))return false;}
    if(fTags.size&&![...fTags].every(t=>r.tags.includes(t)))return false;
    const sc=rLSc(r);if(sc!=null&&sc<fScMin)return false;
    if(q&&!`${r.name} ${r.city} ${r.cuisine} ${r.tags.join(' ')} ${r.visits.map(v=>v.dish+' '+v.notes).join(' ')}`.toLowerCase().includes(q))return false;
    return true;
  });
}
function getSorted(arr){
  if(sortMode==='score')return[...arr].sort((a,b)=>(rLSc(b)||0)-(rLSc(a)||0));
  if(sortMode==='name')return[...arr].sort((a,b)=>a.name.localeCompare(b.name,'de'));
  return[...arr].sort((a,b)=>new Date(rLV(b)?.date||0)-new Date(rLV(a)?.date||0));
}

/* ── TREND LINE SVG (inline mini chart) ── */
function trendLineSVG(r){
  if(r.visits.length<2)return'';
  const chron=[...r.visits].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const scores=chron.map(vSc);
  const valid=scores.filter(x=>x!=null);
  if(valid.length<2)return'';
  const W=70,H=20,pad=3;
  const cW=W-pad*2,cH=H-pad*2;
  const n=chron.length;
  const xP=i=>pad+i*(cW/(n-1));
  const yP=s=>pad+cH-((s-1)/9)*cH;
  const col=valid[valid.length-1]>valid[0]?'var(--green)':valid[valid.length-1]<valid[0]?'var(--red)':'var(--text3)';
  let pts=[];
  chron.forEach((v,i)=>{const s=vSc(v);if(s!=null)pts.push(`${xP(i)},${yP(s)}`);});
  if(pts.length<2)return'';
  return`<svg class="trendline-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polyline points="${pts.join(' ')}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${chron.map((v,i)=>{const s=vSc(v);return s!=null?`<circle cx="${xP(i)}" cy="${yP(s)}" r="${i===n-1?3:2}" fill="${col}"/>`:''}).join('')}
  </svg>`;
}

/* ── RENDER ── */
function render(){
  if(activeTab===3){renderStats();return;}
  if(activeTab===2){renderTimeline();return;}
  if(activeTab===4){renderMap();return;}
  const filtered=getSorted(getFiltered());
  renderChips(filtered);
  renderCatBar();
  const mv=document.getElementById('mainView');
  if(!filtered.length){mv.innerHTML=`<div class="empty"><div class="empty-ico">🍽</div><div class="empty-t">Keine Einträge</div></div>`;return;}
  const groups={};
  filtered.forEach(r=>{if(!groups[r.city])groups[r.city]=[];groups[r.city].push(r);});
  let html='';
  Object.entries(groups).forEach(([city,items])=>{
    html+=`<div class="city-hdr"><span class="city-nm">${city}</span><span class="city-ct">${items.length}</span></div>`;
    if(viewMode==='grid'){
      html+=`<div class="grid-w">`;items.forEach((r,i)=>{html+=gridCard(r,i)});html+=`</div>`;
    } else {
      html+=`<div class="list-w">`;items.forEach((r,i)=>{html+=listCard(r,i)});html+=`</div>`;
    }
  });
  mv.innerHTML=html;
}

/* ── CHART SVG (full) ── */
function buildChart(visits){
  if(visits.length<2)return'';
  const W=320,H=100,P={t:8,r:8,b:22,l:26};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const n=visits.length;
  const xP=i=>P.l+i*(cW/(n-1));
  const yP=v=>P.t+cH-((v-1)/9)*cH;
  const series=[
    {fn:v=>vSc(v),col:'var(--acc)',lbl:'Gesamt'},
    {fn:v=>v.sE,col:'var(--green)',lbl:'Essen'},
    {fn:v=>v.sA,col:'var(--yellow)',lbl:'Ambiente'},
    {fn:v=>v.sS,col:'var(--red)',lbl:'Service'},
  ];
  let svg=`<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" class="chart-svg" style="height:${H}px">`;
  [2,4,6,8,10].forEach(v=>{
    const y=yP(v);
    svg+=`<line x1="${P.l}" y1="${y}" x2="${W-P.r}" y2="${y}" class="c-grid"/>`;
    svg+=`<text x="${P.l-3}" y="${y+3}" class="c-ylbl">${v}</text>`;
  });
  visits.forEach((v,i)=>{
    if(i%Math.max(1,Math.floor(n/4))===0||i===n-1){
      const lbl=v.date?v.date.substring(5):'';
      svg+=`<text x="${xP(i)}" y="${H-2}" class="c-xlbl">${lbl}</text>`;
    }
  });
  series.forEach(s=>{
    const pts=visits.map((v,i)=>({x:xP(i),y:yP(s.fn(v)??0),val:s.fn(v)})).filter(p=>p.val!=null);
    if(pts.length<2)return;
    let d=pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join('');
    svg+=`<path d="${d}" class="c-line" style="stroke:${s.col}"/>`;
    pts.forEach(p=>{svg+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.5" class="c-dot" fill="${s.col}"><title>${p.val}</title></circle>`;});
  });
  svg+=`</svg><div class="chart-legend">`;
  series.forEach(s=>svg+=`<div class="cleg"><div class="cleg-dot" style="background:${s.col}"></div>${s.lbl}</div>`);
  svg+=`</div></div>`;
  return svg;
}

}
function togFavDetail(rid){const r=DB.find(x=>x.id===rid);if(!r)return;r.fav=!r.fav;saveLS();openDetail(rid);render();}
function delRest(rid){if(!confirm('Restaurant und alle Besuche löschen?'))return;DB=DB.filter(x=>x.id!==rid);closeOv('detailOv');render();saveLS();toast('Gelöscht')}

/* ── VISIT DETAIL MODAL (z=400, sits above detail) ── */
function openVisitDetail(rid,vid){
  const r=DB.find(x=>x.id===rid);if(!r)return;
  const v=r.visits.find(x=>x.id===vid);if(!v)return;
  const s=vSc(v);
  let h=`<button class="mox" onclick="closeOv('visitDetailOv')">✕</button>
  <div class="dm-body">
  <div class="vd-score-row">
    <div class="vd-big ${scCls(s)}">${s??'–'}${s!=null?'<span class="dbl">/10</span>':''}</div>
    <div>
      <div class="vd-title">${r.name}</div>
      <div class="vd-sub">📅 ${fmtD(v.date)||'Kein Datum'}</div>
    </div>
  </div>
  <span class="rec-b ${recCls(v.rec)}" style="display:inline-block;margin-bottom:12px">${v.rec==='Ja'?'👍 Empfohlen':v.rec==='Nein'?'👎 Nicht empfohlen':'🤷 Geht so'}</span>`;
  if(v.sE!=null||v.sA!=null||v.sS!=null){
    h+=`<div class="dm-sec"><div class="dm-sec-t">Bewertungen</div>
    <div class="ssc-row">
      ${v.sE!=null?`<div class="ssc"><div class="ssc-v">${v.sE}</div><div class="ssc-l">🍽 Essen</div></div>`:''}
      ${v.sA!=null?`<div class="ssc"><div class="ssc-v">${v.sA}</div><div class="ssc-l">✨ Ambiente</div></div>`:''}
      ${v.sS!=null?`<div class="ssc"><div class="ssc-v">${v.sS}</div><div class="ssc-l">🤝 Service</div></div>`:''}
    </div></div>`;
  }
  if(v.dish&&v.dish!=='–')h+=`<div class="dm-sec"><div class="dm-sec-t">Gericht</div><div class="dm-sec-txt">🍴 ${v.dish}</div></div>`;
  if(v.notes)h+=`<div class="dm-sec"><div class="dm-sec-t">Notizen</div><div class="dm-sec-txt">${v.notes}</div></div>`;
  if(v.dishes&&v.dishes.length){
    h+=`<div class="dm-sec"><div class="dm-sec-t">Gerichtsbewertungen</div><div class="dish-list">`;
    v.dishes.forEach(d=>{
      h+=`<div class="dish-item">
        <div class="dish-name">🍴 ${d.name}</div>
        <div class="dish-score ${scCls(d.score)}">${d.score??'–'}</div>
        <span class="dish-rec rec-b ${recCls(d.rec)}">${d.rec}</span>
      </div>`;
    });
    h+=`</div></div>`;
  }
  // Chart if multiple visits
  if(r.visits.length>1){
    const chronV=[...r.visits].sort((a,b)=>new Date(a.date)-new Date(b.date));
    h+=`<div class="dm-sec"><div class="dm-sec-t">Verlauf</div>${buildChart(chronV)}</div>`;
  }
  h+=`<div class="vd-actions">
    <button class="vd-btn" onclick="closeOv('visitDetailOv')">← Zurück</button>
    <button class="vd-btn edit" onclick="closeOv('visitDetailOv');openVisitForm(${rid},${vid})">✏️ Bearbeiten</button>
    <button class="vd-btn del" onclick="delVisit(${rid},${vid})">🗑 Löschen</button>
  </div>
  </div>`;
  document.getElementById('visitDetailBox').innerHTML=h;
  document.getElementById('visitDetailOv').classList.add('open');
}
function delVisit(rid,vid){
  if(!confirm('Besuch löschen?'))return;
  const r=DB.find(x=>x.id===rid);if(!r)return;
  r.visits=r.visits.filter(x=>x.id!==vid);
  closeOv('visitDetailOv');
  saveLS();render();toast('Besuch gelöscht');
  if(r.visits.length>0){openDetail(rid);}
  else{closeOv('detailOv');}
}

/* ── VISIT FORM (z=500) ── */
function openVisitForm(rid,vid){

  const today=new Date().toISOString().split('T')[0];
  formDishes=[];
  document.getElementById('vf-rid').value=rid;

    document.getElementById('vfTitle').textContent=`➕ Neuer Besuch · ${r.name}`;

    selRec='Ja';

function saveVisit(){
  const rid=parseInt(document.getElementById('vf-rid').value);
  const vidRaw=document.getElementById('vf-vid').value;
  const r=DB.find(x=>x.id===rid);if(!r)return;
  const vObj={id:vidRaw?parseInt(vidRaw):nVid++,date:document.getElementById('vf-date').value,dish:document.getElementById('vf-dish').value,sE:parseFloat(document.getElementById('vf-se').value),sA:parseFloat(document.getElementById('vf-sa').value),sS:parseFloat(document.getElementById('vf-ss').value),rec:selRec,notes:document.getElementById('vf-notes').value,dishes:[...formDishes]};
  if(!vidRaw){r.visits.push(vObj);toast(`✅ Besuch #${r.visits.length} gespeichert!`);}
  else{const vi=r.visits.findIndex(x=>x.id===parseInt(vidRaw));if(vi>=0)r.visits[vi]=vObj;toast('✅ Besuch aktualisiert!');}
  closeOv('visitFormOv');render();saveLS();
  openDetail(rid);
}

function checkDupe(){
  const name=document.getElementById('rf-name').value.trim().toLowerCase();

/* ── TIMELINE ── */
function renderTimeline(){
  const all=[];DB.forEach(r=>r.visits.forEach(v=>all.push({r,v})));
  all.sort((a,b)=>new Date(b.v.date)-new Date(a.v.date));
  const tv=document.getElementById('timelineView');
  if(!all.length){tv.innerHTML=`<div class="empty"><div class="empty-ico">📅</div><div class="empty-t">Noch keine Einträge</div></div>`;return;}
  const grps={};all.forEach(({r,v})=>{const ym=v.date?v.date.substring(0,7):'?';if(!grps[ym])grps[ym]=[];grps[ym].push({r,v});});
  let h='<div style="font-size:22px;font-weight:900;padding:12px 2px 10px">📅 Verlauf</div>';
  Object.entries(grps).forEach(([ym,items])=>{
    const label=ym!=='?'?new Date(ym+'-01').toLocaleDateString('de-DE',{month:'long',year:'numeric'}):ym;
    h+=`<div class="tl-mo">${label}</div>`;
    items.forEach(({r,v},i)=>{
      const s=vSc(v);const isLast=i===items.length-1;
      h+=`<div class="tl-i" onclick="openDetail(${r.id})">
        <div class="tl-left"><div class="tl-dot ${scCls(s)}">${catIco(r.cat)}</div>${!isLast?'<div class="tl-line"></div>':''}</div>
        <div class="tl-card">
          <div class="tl-date">${fmtD(v.date)||'?'} · <span style="color:var(--acc);font-weight:800">${s??'–'}/10</span></div>
          <div class="tl-name">${r.name}</div>
          <div class="tl-meta">📍 ${r.city}${r.cuisine?' · '+r.cuisine:''}${v.dish&&v.dish!=='–'?' · 🍴'+v.dish:''}</div>
        </div>
      </div>`;
    });
  });
  tv.innerHTML=h;
}

    <div class="kpi"><div class="kpi-v">${DB.length}</div><div class="kpi-l">Orte</div></div>
    <div class="kpi"><div class="kpi-v">${allV.length}</div><div class="kpi-l">Besuche</div></div>

    <div class="kpi"><div class="kpi-v">${DB.filter(r=>r.fav).length}</div><div class="kpi-l">Favoriten</div></div>
  </div></div>
  <div class="sc"><div class="sc-t">Ø Einzelbewertungen</div><div class="kpi-row">
    <div class="kpi"><div class="kpi-v">${avgE}</div><div class="kpi-l">🍽 Essen</div></div>
    <div class="kpi"><div class="kpi-v">${avgA}</div><div class="kpi-l">✨ Ambiente</div></div>
    <div class="kpi"><div class="kpi-v">${avgS}</div><div class="kpi-l">🤝 Service</div></div>
  </div></div>
  <div class="sc"><div class="sc-t">🏆 Top</div>${top.map((r,i)=>`<div class="top-item" onclick="openDetail(${r.id})"><div class="top-rank">${i+1}</div><div class="top-info"><div class="top-name">${r.name}</div><div class="top-sub">${r.city}${r.cuisine?' · '+r.cuisine:''}</div></div><div class="top-sc">${rLSc(r)}</div></div>`).join('')}</div>
  <div class="sc"><div class="sc-t">📍 Nach Stadt</div>${cities.map(([c,n])=>`<div class="bar-i"><div class="bar-l">${c}</div><div class="bar-t"><div class="bar-f" style="width:${(n/maxC*100).toFixed(0)}%"></div></div><div class="bar-c">${n}</div></div>`).join('')}</div>
  <div class="sc"><div class="sc-t">🗂 Nach Kategorie</div>${cats.map(([c,n])=>`<div class="bar-i"><div class="bar-l">${catIco(c)} ${c}</div><div class="bar-t"><div class="bar-f" style="width:${(n/maxCt*100).toFixed(0)}%"></div></div><div class="bar-c">${n}</div></div>`).join('')}</div>
  ${cuisines.length?`<div class="sc"><div class="sc-t">🍜 Nach Küche</div>${cuisines.map(([c,n])=>`<div class="bar-i"><div class="bar-l">${c}</div><div class="bar-t"><div class="bar-f" style="width:${(n/maxCu*100).toFixed(0)}%"></div></div><div class="bar-c">${n}</div></div>`).join('')}</div>`:''}
  <div style="padding:0 2px 20px"><button class="btn btn-g" style="width:100%;margin-top:4px" onclick="exportCSV()">📤 CSV Export</button></div>`;
}

/* ── MAP ── */
const CITY_COORDS={'Wien':[48.2082,16.3738],'München':[48.1351,11.5820],'Regensburg':[49.0134,12.1016],'Bärnau':[49.8102,12.4521],'Berlin':[52.5200,13.4050],'Hamburg':[53.5753,10.0153],'Frankfurt':[50.1109,8.6821],'Köln':[50.9333,6.9500],'Stuttgart':[48.7758,9.1829],'Nürnberg':[49.4521,11.0767],'Dresden':[51.0504,13.7373],'Leipzig':[51.3397,12.3731],'Salzburg':[47.8095,13.0550],'Graz':[47.0707,15.4395],'Zürich':[47.3769,8.5417],'Paris':[48.8566,2.3522],'Rom':[41.9028,12.4964],'Barcelona':[41.3851,2.1734],'Prag':[50.0755,14.4378],'Budapest':[47.4979,19.0402],'Amsterdam':[52.3676,4.9041]};
function getCoords(city){if(CITY_COORDS[city])return CITY_COORDS[city];let h=0;for(let i=0;i<city.length;i++)h=(h*31+city.charCodeAt(i))&0xffff;return[48.5+(h%200-100)*0.04,12+(h%300-150)*0.04];}
function renderMap(){
  const el=document.getElementById('mapEl');if(!el)return;
  if(leafMap){try{leafMap.remove();}catch(e){}leafMap=null;}
  try{
    leafMap=L.map(el,{zoomControl:true,preferCanvas:true}).setView([50,12],5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',maxZoom:18}).addTo(leafMap);
    const filtered=getFiltered();
    if(!filtered.length)return;
    const bounds=[];const offsets={};
    filtered.forEach(r=>{
      const base=getCoords(r.city);
      const cnt=offsets[r.city]=(offsets[r.city]||0)+1;
      const angle=(cnt-1)*(Math.PI*2/Math.max(6,filtered.filter(x=>x.city===r.city).length));
      const dist=cnt===1?0:0.0015;
      const ll=[base[0]+Math.sin(angle)*dist,base[1]+Math.cos(angle)*dist];
      bounds.push(ll);
      const lsc=rLSc(r);
      const col=lsc==null?'#888':lsc>=8?'#4ade80':lsc>=6?'#fbbf24':'#f87171';
      const txt=lsc!=null?lsc:catIco(r.cat);
      const icon=L.divIcon({className:'',html:`<div style="width:38px;height:38px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center;font-size:${lsc!=null?'13':'15'}px;font-weight:800;color:#111;box-shadow:0 2px 10px rgba(0,0,0,.35);border:2px solid white;cursor:pointer;font-family:Outfit,sans-serif">${txt}</div>`,iconSize:[38,38],iconAnchor:[19,19]});
      const m=L.marker(ll,{icon}).addTo(leafMap);
      m.on('click',()=>openDetail(r.id));
      const lv=rLV(r);
      m.bindTooltip(`<b>${r.name}</b><br>📍 ${r.city}${lsc?' · ⭐'+lsc:''}${lv?.date?' · '+fmtD(lv.date):''}`,{direction:'top',offset:[0,-22],opacity:.95});
    });
    if(bounds.length===1)leafMap.setView(bounds[0],13);
    else try{leafMap.fitBounds(bounds,{padding:[50,50],maxZoom:14});}catch(e){}
  }catch(e){document.getElementById('mapEl').innerHTML=`<div class="map-err"><span style="font-size:40px">🗺</span><span>Karte nicht verfügbar in der Vorschau.<br>Bitte Datei lokal im Browser öffnen.</span></div>`;}
}
function initMap(){renderMap();}

/* ── EXPORT ── */
function exportCSV(){
  const h=['Datum','Stadt','Kategorie','Name','Küche','Tags','Preis','Gericht','Essen','Ambiente','Service','Gesamt','Empfehlung','Notizen','Maps'];
  const rows=[];DB.forEach(r=>r.visits.forEach(v=>{rows.push([v.date,r.city,r.cat,r.name,r.cuisine,r.tags.join(';'),r.price,v.dish,v.sE??'',v.sA??'',v.sS??'',vSc(v)??'',v.rec,v.notes?.replace(/\n/g,' '),r.maps].map(x=>`"${String(x||'').replace(/"/g,'""')}"`).join(';'));}));
  const blob=new Blob(['\uFEFF'+[h.join(';'),...rows].join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Tastemap.csv';a.click();toast('📤 CSV exportiert');
}

/* ── OVERLAY HELPERS ── */
function closeOv(id){document.getElementById(id).classList.remove('open');}
function ovBg(ev,id){if(ev.target===document.getElementById(id))closeOv(id);}
function shOvBg(ev,id){if(ev.target===document.getElementById(id))closeOv(id);}

/* ── TOAST ── */
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

/* ── INIT ── */
loadLS();populateCuisineSel();renderCatBar();render();
